---
name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      addon:
        description: "Specific add-on to build (leave empty for all)"
        required: false
        type: string

jobs:
  detect-changes:
    name: Detect changed add-ons
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Detect changes and build matrix
        id: set-matrix
        run: |
          # Discover all add-on folders (those containing a config.yaml)
          ALL_ADDONS=$(find . -maxdepth 2 -name config.yaml -not -path './.github/*' -exec dirname {} \; | sed 's|^./||' | sort)

          CHANGED_ADDONS=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.addon }}" ]]; then
              CHANGED_ADDONS="${{ inputs.addon }}"
            else
              CHANGED_ADDONS="$ALL_ADDONS"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            CHANGED_ADDONS="$ALL_ADDONS"
          else
            # Determine base commit for diff
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
            fi

            # Handle initial push (all zeros SHA)
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_ADDONS="$ALL_ADDONS"
            else
              CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")

              # If workflow files changed, rebuild all add-ons
              if echo "$CHANGED_FILES" | grep -q '^\.github/workflows/'; then
                CHANGED_ADDONS="$ALL_ADDONS"
              else
                for addon in $ALL_ADDONS; do
                  if echo "$CHANGED_FILES" | grep -q "^${addon}/"; then
                    CHANGED_ADDONS="${CHANGED_ADDONS} ${addon}"
                  fi
                done
              fi
            fi
          fi

          # Build the matrix JSON from changed add-ons and their architectures
          MATRIX='{"include":['
          FIRST=true
          for addon in $CHANGED_ADDONS; do
            [ -z "$addon" ] && continue
            if [ ! -f "${addon}/config.yaml" ]; then
              echo "::warning::Add-on '${addon}' not found, skipping"
              continue
            fi
            ARCHS=$(yq eval '.arch[]' "${addon}/config.yaml")
            for arch in $ARCHS; do
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                MATRIX="${MATRIX},"
              fi
              MATRIX="${MATRIX}{\"addon\":\"${addon}\",\"arch\":\"${arch}\"}"
            done
          done
          MATRIX="${MATRIX}]}"

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          if [ "$FIRST" = true ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No add-on changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Matrix: ${MATRIX}"
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/_build-addon.yaml
    with:
      addon: ${{ matrix.addon }}
      arch: ${{ matrix.arch }}
    secrets: inherit
