---
version: 0.1.0
slug: openclaw
name: OpenClaw
description: >-
  Personal AI assistant with multi-channel support including WhatsApp,
  Telegram, Slack, Discord, and more. Deploy your own AI assistant on
  your Home Assistant instance.
url: >-
  https://github.com/rios0rios0/home-assistant-addons/tree/main/openclaw
arch:
  - aarch64
  - amd64
discovery: []
hassio_api: true
homeassistant: 2024.6.0
host_ipc: false
host_network: false
host_dbus: false
image: ghcr.io/rios0rios0/home-assistant-addons/openclaw
ingress: true
ingress_port: 18789
ingress_stream: true
init: false
ports:
  "18789/tcp": 18789
ports_description:
  "18789/tcp": OpenClaw Gateway (WebSocket)
map:
  - type: addon_config
    read_only: false
  - type: ssl
    read_only: true
options:
  anthropic_api_key: ""
  openai_api_key: ""
  default_model: ""
  telegram_bot_token: ""
  telegram_enabled: false
  discord_bot_token: ""
  discord_enabled: false
  slack_bot_token: ""
  slack_enabled: false
  webchat_enabled: true
  log_level: info
schema:
  anthropic_api_key: str?
  openai_api_key: str?
  default_model: str?
  telegram_bot_token: str?
  telegram_enabled: bool
  discord_bot_token: str?
  discord_enabled: bool
  slack_bot_token: str?
  slack_enabled: bool
  webchat_enabled: bool
  log_level: list(verbose|debug|info|warning|error|critical)?
startup: services
stage: experimental
