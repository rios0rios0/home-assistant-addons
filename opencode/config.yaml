---
version: 0.1.0
slug: opencode
name: OpenCode
description: >-
  AI coding agent for the terminal, accessible via web browser through
  Home Assistant ingress. Supports multiple AI providers.
url: >-
  https://github.com/rios0rios0/home-assistant-addons/tree/main/opencode
arch:
  - aarch64
  - amd64
discovery: []
hassio_api: false
homeassistant: 2024.6.0
host_ipc: false
host_network: false
host_dbus: false
image: ghcr.io/rios0rios0/home-assistant-addons/opencode
ingress: true
ingress_port: 7681
ingress_stream: true
init: false
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  anthropic_api_key: ""
  openai_api_key: ""
  gemini_api_key: ""
  groq_api_key: ""
  default_provider: anthropic
  default_model: ""
  working_directory: /share
  log_level: info
schema:
  anthropic_api_key: str?
  openai_api_key: str?
  gemini_api_key: str?
  groq_api_key: str?
  default_provider: list(anthropic|openai|gemini|groq)?
  default_model: str?
  working_directory: str
  log_level: list(verbose|debug|info|warning|error|critical)?
startup: application
stage: experimental
