---
version: 0.1.0
slug: huginn
name: Huginn
description: >-
  System for building agents that perform automated tasks online.
  Monitor websites, scrape data, and send notifications.
url: >-
  https://github.com/rios0rios0/home-assistant-addons/tree/main/huginn
arch:
  - aarch64
  - amd64
discovery: []
hassio_api: false
homeassistant: 2024.6.0
host_ipc: false
host_network: false
host_dbus: false
image: ghcr.io/rios0rios0/home-assistant-addons/huginn/{arch}-addon
ingress: true
ingress_port: 3000
ingress_stream: true
init: false
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  app_secret_token: ""
  timezone: Etc/UTC
  invitation_code: ""
  smtp_domain: ""
  smtp_server: ""
  smtp_port: 587
  smtp_user_name: ""
  smtp_password: ""
  log_level: info
schema:
  app_secret_token: str
  timezone: str
  invitation_code: str?
  smtp_domain: str?
  smtp_server: str?
  smtp_port: int
  smtp_user_name: str?
  smtp_password: str?
  log_level: list(verbose|debug|info|warning|error|critical)?
startup: services
stage: experimental
