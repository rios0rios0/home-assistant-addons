---
version: 0.1.0
slug: uptime-kuma
name: Uptime Kuma
description: >-
  Self-hosted monitoring tool for HTTP(s), TCP, DNS, and other protocols
  with a clean status page and notification system.
url: >-
  https://github.com/rios0rios0/home-assistant-addons/tree/main/uptime-kuma
arch:
  - aarch64
  - amd64
discovery: []
hassio_api: false
homeassistant: 2024.6.0
host_ipc: false
host_network: false
host_dbus: false
image: ghcr.io/rios0rios0/home-assistant-addons/uptime-kuma
ingress: true
ingress_port: 3001
ingress_stream: true
init: false
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  data_dir: /share/uptime-kuma
  log_level: info
schema:
  data_dir: str
  log_level: list(verbose|debug|info|warning|error|critical)?
startup: services
stage: experimental
